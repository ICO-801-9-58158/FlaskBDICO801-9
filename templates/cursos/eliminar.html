{% extends "layout.html" %} {% block container %}

<div class="py-12 relative overflow-hidden px-4 md:px-8 mt-24 max-w-lg mx-auto">
  <!-- Decorative background elements -->
  <div class="absolute top-0 right-0 w-48 h-48 bg-rose-600 rounded-full mix-blend-screen filter blur-[80px] opacity-20"></div>
  
  <div class="relative z-10">
    <div class="bg-white/5 shadow-[0_8px_32px_rgba(0,0,0,0.3)] backdrop-blur-xl border border-white/10 rounded-2xl p-8 border-t-rose-500/50">
      <div class="w-20 h-20 bg-rose-500/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-rose-500/30">
        <svg class="w-10 h-10 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
      </div>

      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-white mb-2">¿Eliminar Curso?</h2>
        <p class="text-slate-400">Estás a punto de eliminar el curso <span class="text-white font-semibold">"{{ form.nombre.data }}"</span>. Esta acción no se puede deshacer y afectará a los alumnos inscritos.</p>
      </div>

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="id" value="{{ form.id.data }}">
        
        <div class="flex flex-col gap-3">
          <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-6 rounded-xl shadow-[0_0_15px_rgba(225,29,72,0.3)] transition-all duration-300">
            Sí, Eliminar Curso
          </button>
          <a href="{{ url_for('cursos.lista_cursos') }}" class="w-full text-center px-6 py-3 rounded-xl border border-white/10 text-slate-300 font-semibold hover:bg-white/5 transition-all duration-300">
            Cancelar
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
