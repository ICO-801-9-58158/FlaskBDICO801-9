{% extends "layout.html" %} {% block container %}

<div class="py-12 relative overflow-hidden px-4 md:px-8 mt-24 max-w-2xl mx-auto">
  <!-- Decorative background elements -->
  <div class="absolute top-0 right-0 w-64 h-64 bg-fuchsia-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20"></div>
  <div class="absolute bottom-0 left-0 w-64 h-64 bg-indigo-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20"></div>

  <div class="relative z-10">
    <div class="mb-8 text-center">
      <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-indigo-400 tracking-tight">Nueva Inscripción</h2>
      <p class="text-slate-400 mt-2 text-sm font-medium">Vincula a un alumno con un curso disponible.</p>
    </div>

    <div class="bg-white/5 shadow-[0_8px_32px_rgba(0,0,0,0.3)] backdrop-blur-xl border border-white/10 rounded-2xl p-8">
      <form method="POST" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div>
          <label for="alumno_id" class="block text-sm font-semibold text-slate-300 mb-2">Seleccionar Alumno</label>
          <select name="alumno_id" id="alumno_id" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-fuchsia-500/50 focus:border-fuchsia-500 transition-all duration-300 outline-none">
            <option value="" disabled selected>-- Seleccione un alumno --</option>
            {% for alum in alumnos %}
                <option value="{{ alum.id }}">{{ alum.nombre }} {{ alum.apaterno }} {{ alum.amaterno }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label for="curso_id" class="block text-sm font-semibold text-slate-300 mb-2">Seleccionar Curso</label>
          <select name="curso_id" id="curso_id" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-fuchsia-500/50 focus:border-fuchsia-500 transition-all duration-300 outline-none">
            <option value="" disabled {{ 'selected' if not form.curso_id.data else '' }}>-- Seleccione un curso --</option>
            {% for curso in cursos %}
                <option value="{{ curso.id }}" {{ 'selected' if form.curso_id.data|string == curso.id|string else '' }}>
                    {{ curso.nombre }} (Maestro: {{ curso.maestro.nombre }})
                </option>
            {% endfor %}
          </select>
        </div>

        <div class="flex gap-4 pt-4">
          <a href="{{ url_for('inscripciones.lista_inscripciones') }}" class="flex-1 text-center px-6 py-3 rounded-xl border border-white/10 text-slate-300 font-semibold hover:bg-white/5 transition-all duration-300">
            Cancelar
          </a>
          <button type="submit" class="flex-[2] bg-gradient-to-r from-fuchsia-600 to-indigo-600 text-white font-bold py-3 px-6 rounded-xl shadow-[0_0_20px_rgba(217,70,239,0.3)] hover:shadow-[0_0_25px_rgba(217,70,239,0.5)] hover:scale-[1.02] active:scale-95 transition-all duration-300">
            Realizar Inscripción
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
