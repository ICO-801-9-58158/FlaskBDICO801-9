{% extends "layout.html" %} 
{% block container %} 

<div class="py-12 relative flex justify-center items-center px-4 w-full mt-4">
  <div class="relative w-full max-w-2xl">
    <!-- Glow effects -->
    <div class="absolute -top-10 -left-10 w-48 h-48 bg-fuchsia-600 rounded-full mix-blend-screen filter blur-[80px] opacity-20 animate-pulse"></div>
    <div class="absolute -bottom-10 -right-10 w-48 h-48 bg-indigo-600 rounded-full mix-blend-screen filter blur-[80px] opacity-20 animate-pulse"></div>

    <div class="relative bg-white/5 shadow-[0_8px_32px_rgba(0,0,0,0.3)] backdrop-blur-2xl border border-white/10 rounded-3xl p-8 md:p-12 transition-all duration-500 hover:shadow-[0_8px_48px_rgba(0,0,0,0.4)]">
      <div class="flex items-center justify-between mb-8 border-b border-white/10 pb-6">
        <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-indigo-400 tracking-tight">Detalles del Maestro</h2>
        <div class="px-3 py-1 rounded-full bg-fuchsia-500/10 border border-fuchsia-500/20 text-fuchsia-400 text-xs font-bold uppercase tracking-widest">Matrícula: {{ matricula }}</div>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-black/20 p-5 rounded-2xl border border-white/5 transition-all duration-300 hover:bg-black/30 hover:border-white/10">
          <span class="text-xs text-fuchsia-400 font-bold uppercase tracking-widest block mb-2">Nombre Completo</span>
          <span class="text-xl font-semibold text-white">{{ nombre }} {{ apellidos }}</span>
        </div>
        
        <div class="bg-black/20 p-5 rounded-2xl border border-white/5 transition-all duration-300 hover:bg-black/30 hover:border-white/10">
          <span class="text-xs text-fuchsia-400 font-bold uppercase tracking-widest block mb-2">Especialidad</span>
          <span class="text-xl font-semibold text-white">{{ especialidad }}</span>
        </div>
        
        <div class="bg-black/20 p-5 rounded-2xl border border-white/5 transition-all duration-300 hover:bg-black/30 hover:border-white/10 md:col-span-2">
          <span class="text-xs text-fuchsia-400 font-bold uppercase tracking-widest block mb-2">Correo Electrónico</span>
          <span class="text-xl font-semibold text-white break-all">{{ email }}</span>
        </div>
      </div>
      
      <div class="flex flex-col sm:flex-row gap-4 items-center justify-center mt-12 pt-8 border-t border-white/5">
        <a href="{{ url_for('maestros.maestros_modificar', matricula=matricula) }}" class="w-full sm:w-auto flex justify-center items-center gap-2 px-8 py-3.5 text-sm font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition-all duration-300 uppercase tracking-widest shadow-[0_0_20px_rgba(79,70,229,0.3)]">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
          </svg>
          Editar Registro
        </a>
        
        <a href="{{ url_for('maestros.maestros') }}" class="w-full sm:w-auto flex justify-center items-center gap-2 px-8 py-3.5 text-sm font-bold text-slate-300 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 hover:text-white transition-all duration-300 uppercase tracking-widest">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Volver al Inicio
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
