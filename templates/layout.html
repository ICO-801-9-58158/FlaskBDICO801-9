<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Escuela</title>
    <!-- Use Tailwind CDN to ensure all dynamic glassmorphism and gradient classes applied in redesign work without rebuilding -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">
</head>
<body class="bg-slate-900 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-900 via-slate-900 to-black min-h-screen text-slate-100 font-sans antialiased selection:bg-fuchsia-500 selection:text-white pb-12">

<nav class="fixed w-full z-50 top-0 start-0 border-b border-white/10 bg-slate-900/50 backdrop-blur-xl shadow-lg transition-all duration-300">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
    <a href="{{ url_for('index') }}" class="flex items-center space-x-3 rtl:space-x-reverse group">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-fuchsia-500 to-indigo-600 flex items-center justify-center text-white font-bold text-xl shadow-[0_0_15px_rgba(139,92,246,0.5)] group-hover:scale-110 transition-transform duration-300">
        PE
      </div>
      <span class="self-center text-2xl font-extrabold whitespace-nowrap bg-clip-text text-transparent bg-gradient-to-r from-fuchsia-400 to-indigo-400 tracking-tight">Proyecto Escuela</span>
    </a>

    <div class="items-center justify-between hidden w-full md:flex md:w-auto">
      <ul class="flex flex-col p-2 md:p-1 mt-4 font-medium rounded-2xl md:space-x-2 md:flex-row md:mt-0 bg-white/5 md:bg-white/5 border border-white/10 backdrop-blur-md">
        <li>
          <a href="{{ url_for('index') }}" class="block py-2 px-4 text-white hover:text-fuchsia-400 bg-white/10 hover:bg-white/20 rounded-xl transition-all duration-300 font-semibold shadow-sm">Inicio</a>
        </li>
        <li>
          <!-- Needs correct URL, let's just point to current route if we don't know it, or keep it to index if that was original -->
          <a href="{{ url_for('index') }}" class="block py-2 px-4 text-slate-300 hover:text-white hover:bg-white/10 rounded-xl transition-all duration-300 font-medium">Alumnos</a>
        </li>
        <li>
          <a href="{{ url_for('maestros.maestros') }}" class="block py-2 px-4 text-slate-300 hover:text-white hover:bg-white/10 rounded-xl transition-all duration-300 font-medium">Maestros</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="max-w-screen-xl mx-auto mt-28 px-4 relative z-40">
      {% for message in messages %}
        <div class="p-4 mb-4 text-sm text-fuchsia-100 rounded-2xl bg-fuchsia-900/50 border border-fuchsia-500/30 backdrop-blur-md shadow-[0_0_20px_rgba(217,70,239,0.15)] flex items-center gap-3 animate-[pulse_2s_ease-in-out_1]" role="alert">
          <svg class="w-5 h-5 text-fuchsia-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <span class="font-medium">{{ message }}</span>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="container mx-auto px-4 mt-28">
    {% block container %}
    {% endblock %}
</div>

<script src="{{url_for('static',filename='node_modules/flowbite/dist/flowbite.min.js')}}"></script>
</body>
</html>
