{% extends "layout.html" %}

{% block container %}
<div class="bg-white/5 shadow-[0_8px_32px_rgba(0,0,0,0.3)] backdrop-blur-2xl border border-white/10 rounded-3xl p-10 md:p-16 text-center relative overflow-hidden group mt-10">
    <div class="absolute inset-0 bg-gradient-to-br from-fuchsia-500/10 to-indigo-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
    <div class="absolute -top-32 -left-32 w-72 h-72 bg-fuchsia-500 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-[pulse_4s_ease-in-out_infinite]"></div>
    <div class="absolute -bottom-32 -right-32 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-[pulse_4s_ease-in-out_infinite]" style="animation-delay: 2s;"></div>
    
    <h1 class="text-4xl md:text-6xl font-black bg-clip-text text-transparent bg-gradient-to-r from-fuchsia-400 via-purple-400 to-indigo-400 mb-6 drop-shadow-sm relative z-10 tracking-tight leading-tight">Sistema Escolar</h1>
    <p class="text-slate-300 text-lg md:text-xl mb-12 max-w-2xl mx-auto font-light leading-relaxed relative z-10">
        Administra alumnos, maestros, cursos, realiza inscripciones y ejecuta consultas de forma rápida y moderna.
    </p>

    <div class="grid md:grid-cols-3 gap-6 mt-8 relative z-10 max-w-5xl mx-auto">
        <a href="{{ url_for('lista_alumnos') }}" class="group/card relative bg-white/5 border border-white/10 p-8 rounded-2xl hover:bg-white/10 transition-all duration-500 hover:-translate-y-2 hover:shadow-[0_0_30px_rgba(168,85,247,0.3)] overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-purple-600/20 to-transparent opacity-0 group-hover/card:opacity-100 transition-opacity duration-500"></div>
            <div class="w-16 h-16 mx-auto mb-6 bg-purple-500/20 rounded-2xl flex items-center justify-center border border-purple-500/30 group-hover/card:scale-110 group-hover/card:rotate-3 transition-transform duration-500">
                <svg class="w-8 h-8 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 group-hover/card:text-purple-300 transition-colors">Alumnos</h3>
            <p class="text-slate-400 text-sm font-medium">Gestión de estudiantes</p>
        </a>
        <a href="{{ url_for('maestros.maestros') }}" class="group/card relative bg-white/5 border border-white/10 p-8 rounded-2xl hover:bg-white/10 transition-all duration-500 hover:-translate-y-2 hover:shadow-[0_0_30px_rgba(56,183,252,0.3)] overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-sky-600/20 to-transparent opacity-0 group-hover/card:opacity-100 transition-opacity duration-500"></div>
            <div class="w-16 h-16 mx-auto mb-6 bg-sky-500/20 rounded-2xl flex items-center justify-center border border-sky-500/30 group-hover/card:scale-110 group-hover/card:-rotate-3 transition-transform duration-500">
                <svg class="w-8 h-8 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 group-hover/card:text-sky-300 transition-colors">Maestros</h3>
            <p class="text-slate-400 text-sm font-medium">Control docente</p>
        </a>
        <a href="#" class="group/card relative bg-white/5 border border-white/10 p-8 rounded-2xl hover:bg-white/10 transition-all duration-500 hover:-translate-y-2 hover:shadow-[0_0_30px_rgba(244,63,94,0.3)] overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-rose-600/20 to-transparent opacity-0 group-hover/card:opacity-100 transition-opacity duration-500"></div>
            <div class="w-16 h-16 mx-auto mb-6 bg-rose-500/20 rounded-2xl flex items-center justify-center border border-rose-500/30 group-hover/card:scale-110 group-hover/card:rotate-3 transition-transform duration-500">
                <svg class="w-8 h-8 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 group-hover/card:text-rose-300 transition-colors">Cursos</h3>
            <p class="text-slate-400 text-sm font-medium">Asignaturas y más</p>
        </a>
    </div>
</div>
{% endblock %}
